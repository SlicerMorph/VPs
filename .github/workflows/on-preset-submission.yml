name: Process preset submission

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  process:
    if: startsWith(github.event.issue.title, 'New preset:')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Add preset-submission label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['preset-submission']
              })
            } catch(e) { console.log('Label already set or error:', e.message) }

      - name: Install dependencies
        run: pip install boto3 -q

      - name: Validate and create PR
        env:
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          S3_ACCESS: ${{ secrets.ACCESS }}
          S3_SECRET: ${{ secrets.SECRET }}
        run: python3 .github/scripts/process_submission.py
