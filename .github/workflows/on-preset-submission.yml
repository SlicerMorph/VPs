name: Validate preset submission

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  validate:
    if: >
      startsWith(github.event.issue.title, 'New preset:') ||
      contains(github.event.issue.body, 'SubmitVolumeRenderingPreset module')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add preset-submission label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['preset-submission']
              })
            } catch(e) {
              console.log('Could not add label:', e.message)
            }

      - name: Validate submission
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/validate_submission.py
