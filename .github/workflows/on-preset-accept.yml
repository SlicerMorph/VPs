name: Accept preset submission

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  accept:
    if: startsWith(github.event.comment.body, '/accept')
    runs-on: ubuntu-latest

    steps:
      - name: Check maintainer permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            })
            const allowed = ['admin', 'maintain', 'write']
            if (!allowed.includes(perm.permission)) {
              core.setFailed(`@${context.actor} does not have write permission — only maintainers can accept submissions.`)
            }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch issue body and author
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            core.setOutput('body', issue.body)
            core.setOutput('author', issue.user.login)

      - name: Create branch, commit files, open PR
        env:
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ steps.issue.outputs.author }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/accept_submission.py
