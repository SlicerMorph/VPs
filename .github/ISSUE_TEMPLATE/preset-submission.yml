name: Submit a Volume Rendering Preset
description: Share a volume-rendering preset (.vp.json + preview PNG) with the SlicerMorph community.
title: "New preset: "
labels:
  - preset-submission
body:
  - type: markdown
    attributes:
      value: |
        ## How to submit

        Use the **SubmitVolumeRenderingPreset** module in SlicerMorph:
        1. Select your preset and click **1 – Export preset files**.
        2. Click **2 – Upload and submit to GitHub**.
        3. The module uploads the files automatically and opens this form pre-filled.
        4. Click **Submit new issue** — that's it!

        > **Note:** You need a free [GitHub account](https://github.com/signup) to submit.

  - type: input
    id: description
    attributes:
      label: Short description (optional)
      description: One-line description of what this preset is good for.
      placeholder: Optimised for mouse cranial CT, 50 µm isotropic
    validations:
      required: false

  - type: input
    id: specimen
    attributes:
      label: Specimen / dataset (optional)
      description: What specimen or scan type was this preset tuned for?
      placeholder: Mus musculus skull, microCT
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission checklist
      options:
        - label: I submitted this via the SlicerMorph SubmitVolumeRenderingPreset module
          required: true
        - label: I agree to share this preset under the repository's open license
          required: true

  - type: textarea
    id: preset_json
    attributes:
      label: Preset JSON
      description: >-
        Open `<name>.vp.json` in a text editor, select all, and paste here.
        The automation needs to read the content directly.
      render: json
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot (PNG)
      description: >-
        Drag and drop `<name>.png` into this box. GitHub will embed it as an image.
      placeholder: "(drag PNG here)"
    validations:
      required: true
