name: Submit a Volume Rendering Preset
description: Share a volume-rendering preset (.vp.json + preview PNG) with the SlicerMorph community.
title: "New preset: "
labels:
  - preset-submission
body:
  - type: markdown
    attributes:
      value: |
        ## How to submit

        1. Use the **SubmitVolumeRenderingPreset** module in SlicerMorph to export your preset files.
        2. Fill in the fields below.
        3. **Paste the contents** of `<name>.vp.json` into the JSON box below.
        4. **Drag and drop** `<name>.png` into the Screenshot box so GitHub embeds it.
        5. Click **Submit new issue**.

        A maintainer will validate and merge your preset — you'll be credited by your GitHub username.

  - type: input
    id: preset_name
    attributes:
      label: Preset name (filename prefix)
      description: >
        Must match the filename prefix exactly. Only letters, digits, `_` and `-` allowed.
        Example: `MouseSkull`
      placeholder: MouseSkull
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: Short description
      description: One-line description of what this preset is good for.
      placeholder: Optimised for mouse cranial CT, 50 µm isotropic
    validations:
      required: false

  - type: input
    id: specimen
    attributes:
      label: Specimen / dataset (optional)
      description: What specimen or scan type was this preset tuned for?
      placeholder: Mus musculus skull, microCT
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission checklist
      options:
        - label: I have pasted the contents of `<name>.vp.json` in the JSON field below
          required: true
        - label: I have drag-dropped `<name>.png` into the Screenshot field below
          required: true
        - label: I agree to share this preset under the repository's open license
          required: true

  - type: textarea
    id: preset_json
    attributes:
      label: Preset JSON
      description: >-
        Open `<name>.vp.json` in a text editor, select all, and paste here.
        The automation needs to read the content directly.
      render: json
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot (PNG)
      description: >-
        Drag and drop `<name>.png` into this box. GitHub will embed it as an image.
      placeholder: "(drag PNG here)"
    validations:
      required: true
